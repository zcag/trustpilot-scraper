name: Deploy to Apify
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: apify/push-actor-action@v1.0.0
        id: push
        continue-on-error: true
        with:
          token: ${{ secrets.APIFY_TOKEN }}
      - name: Set categories (does not require T&C)
        if: always()
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          ACTOR_NAME=$(python3 -c "import json; print(json.load(open('.actor/actor.json'))['name'])")
          USERNAME=$(curl -s -H "Authorization: Bearer $APIFY_TOKEN" https://api.apify.com/v2/users/me | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['data']['username'])")
          echo "Setting categories for ${USERNAME}~${ACTOR_NAME}..."
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"categories": ["LEAD_GENERATION", "ECOMMERCE", "SEO_TOOLS"]}' \
            "https://api.apify.com/v2/acts/${USERNAME}~${ACTOR_NAME}")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          if 'error' in d:
              print('CATEGORIES ERROR:', d['error'].get('message','unknown'))
          else:
              print('CATEGORIES SET:', d.get('data',{}).get('categories','unknown'))
          "
      - name: Dump actor state (diagnostic)
        if: always()
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          ACTOR_NAME=$(python3 -c "import json; print(json.load(open('.actor/actor.json'))['name'])")
          USERNAME=$(curl -s -H "Authorization: Bearer $APIFY_TOKEN" https://api.apify.com/v2/users/me | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['data']['username'])")
          curl -s -H "Authorization: Bearer $APIFY_TOKEN" \
            "https://api.apify.com/v2/acts/${USERNAME}~${ACTOR_NAME}" | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read()).get('data',{})
          fields = ['name','title','description','isPublic','categories','seoTitle','seoDescription','pictureUrl','restartOnError','versions']
          for f in fields:
              v = d.get(f, 'NOT SET')
              if f == 'versions' and isinstance(v, list):
                  v = f'{len(v)} version(s)'
              print(f'{f}: {v}')
          # Show all top-level keys
          print('ALL KEYS:', sorted(d.keys()))
          "
      - name: Make actor public (needs T&C acceptance in console first)
        id: publish
        if: always()
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          ACTOR_NAME=$(python3 -c "import json; print(json.load(open('.actor/actor.json'))['name'])")
          USERNAME=$(curl -s -H "Authorization: Bearer $APIFY_TOKEN" https://api.apify.com/v2/users/me | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['data']['username'])")
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"isPublic": true}' \
            "https://api.apify.com/v2/acts/${USERNAME}~${ACTOR_NAME}")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          if 'error' in d:
              print('NOT YET PUBLIC:', d['error'].get('message','unknown'))
              print('Actor is deployed but not visible in Store. Accept T&C at https://console.apify.com to publish.')
              sys.exit(1)
          else:
              print('SUCCESS: actor is now public')
          "
