name: Deploy to Apify
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: apify/push-actor-action@v1.0.0
        id: push
        continue-on-error: true
        with:
          token: ${{ secrets.APIFY_TOKEN }}
      - name: Set publication metadata
        if: always()
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          ACTOR_NAME=$(python3 -c "import json; print(json.load(open('.actor/actor.json'))['name'])")
          USERNAME=$(curl -s -H "Authorization: Bearer $APIFY_TOKEN" https://api.apify.com/v2/users/me | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['data']['username'])")
          echo "Setting metadata for ${USERNAME}~${ACTOR_NAME}..."
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Trustpilot Reviews Scraper API | $0.50/1K Reviews",
              "description": "Scrape Trustpilot reviews, ratings, and company profiles. Extract star ratings, review text, author info, and aggregate statistics. Fast JSON-LD extraction — no browser needed. Pay only for results.",
              "seoTitle": "Trustpilot Review Scraper - Extract Reviews & Ratings",
              "seoDescription": "Scrape Trustpilot reviews at scale. Extract ratings, review text, author info. JSON-LD extraction, no browser needed. $0.50 per 1,000 reviews.",
              "categories": ["LEAD_GENERATION", "ECOMMERCE", "SEO_TOOLS"],
              "pictureUrl": "https://raw.githubusercontent.com/zcag/trustpilot-scraper/main/.actor/logo.svg"
            }' \
            "https://api.apify.com/v2/acts/${USERNAME}~${ACTOR_NAME}")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          if 'error' in d:
              print('METADATA ERROR:', d['error'].get('message','unknown'))
          else:
              data=d.get('data',{})
              print('title:', data.get('title','?'))
              print('description:', data.get('description','NOT SET'))
              print('seoTitle:', data.get('seoTitle','NOT SET'))
              print('seoDescription:', data.get('seoDescription','NOT SET'))
              print('categories:', data.get('categories','?'))
              print('pictureUrl:', data.get('pictureUrl','NOT SET'))
              print('ALL KEYS:', sorted(data.keys()))
          "
      - name: Make actor public (needs T&C acceptance in console first)
        id: publish
        if: always()
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          ACTOR_NAME=$(python3 -c "import json; print(json.load(open('.actor/actor.json'))['name'])")
          USERNAME=$(curl -s -H "Authorization: Bearer $APIFY_TOKEN" https://api.apify.com/v2/users/me | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['data']['username'])")
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"isPublic": true}' \
            "https://api.apify.com/v2/acts/${USERNAME}~${ACTOR_NAME}")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          if 'error' in d:
              print('NOT YET PUBLIC:', d['error'].get('message','unknown'))
              print('Actor is deployed but not visible in Store. Accept T&C at https://console.apify.com to publish.')
              sys.exit(1)
          else:
              print('SUCCESS: actor is now public')
          "
